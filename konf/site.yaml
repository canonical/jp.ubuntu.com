domain: jp.ubuntu.com

image: prod-comms.ps5.docker-registry.canonical.com/jp.ubuntu.com

useProxy: false
readinessPath: "/"

env:
  - name: SENTRY_DSN
    value: https://5d270c51e9a946b6ae1bb0155498738d@sentry.is.canonical.com//12

  - name: DISCOURSE_API_KEY
    secretKeyRef:
      key: ubuntu-api-key
      name: discourse-api

  - name: DISCOURSE_API_USERNAME
    secretKeyRef:
      key: ubuntu-api-username
      name: discourse-api

  - name: COOKIE_SERVICE_API_KEY
    secretKeyRef:
      key: cookies-api-key
      name: cookies-canonical-com-credentials

  - name: WORDPRESS_APPLICATION_PASSWORD
    secretKeyRef:
      key: wordpress-application-password
      name: wordpress-api

  - name: WORDPRESS_USERNAME
    secretKeyRef:
      key: wordpress-username
      name: wordpress-api

# Overrides for demo
demo:
  env:
    - name: HTTP_PROXY
      value: http://squid.internal:3128
    
    - name: HTTPS_PROXY
      value: http://squid.internal:3128
    

    - name: NO_PROXY
      value: "10.24.0.132,10.24.0.23,.internal,admin.insights.ubuntu.com,ubuntu.com,.ubuntu.com,snapcraft.io,.snapcraft.io,jujucharms.com,.jujucharms.com,maas.io,.maas.io,conjure-up.io,.conjure-up.io,netplan.io,.netplan.io,canonical.com,.canonical.com,launchpad.net,.launchpad.net,linuxcontainers.org,.linuxcontainers.org,cloud-init.io,.cloud-init.io,vanillaframework.io,.vanillaframework.io,anbox-cloud.io,.anbox-cloud.io,juju.is,.juju.is,dqlite.io,.dqlite.io,charmhub.io,.charmhub.io,canonical.design,.canonical.design"

# Overrides for production
production:
  replicas: 5
  routes:
    - paths: [/blog]
      name: jp-ubuntu-com-blog
      app_name: jp.ubuntu.com-blog
      image: prod-comms.ps5.docker-registry.canonical.com/jp.ubuntu.com
      replicas: 3
      memoryLimit: 256Mi
      env:
        - name: DISCOURSE_API_KEY
          secretKeyRef:
            key: ubuntu-api-key
            name: discourse-api

        - name: DISCOURSE_API_USERNAME
          secretKeyRef:
            key: ubuntu-api-username
            name: discourse-api

        - name: SENTRY_DSN
          value: https://5d270c51e9a946b6ae1bb0155498738d@sentry.is.canonical.com//12

  nginxConfigurationSnippet: |
    more_set_headers "Link: <https://assets.ubuntu.com>; rel=preconnect; crossorigin, <https://assets.ubuntu.com>; rel=preconnect";
  

# Overrides for staging
staging:
  replicas: 3
  routes:
    - paths: [/blog]
      name: jp-ubuntu-com-blog
      app_name: jp.ubuntu.com-blog
      image: prod-comms.ps5.docker-registry.canonical.com/jp.ubuntu.com
      replicas: 3
      memoryLimit: 256Mi
      env:
        - name: DISCOURSE_API_KEY
          secretKeyRef:
            key: ubuntu-api-key
            name: discourse-api

        - name: DISCOURSE_API_USERNAME
          secretKeyRef:
            key: ubuntu-api-username
            name: discourse-api

        - name: SENTRY_DSN
          value: https://5d270c51e9a946b6ae1bb0155498738d@sentry.is.canonical.com//12

  nginxConfigurationSnippet: |
    more_set_headers "X-Robots-Tag: noindex";
    more_set_headers "Link: <https://assets.ubuntu.com>; rel=preconnect; crossorigin, <https://assets.ubuntu.com>; rel=preconnect";
