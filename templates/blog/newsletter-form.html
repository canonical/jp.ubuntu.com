<div class="p-strip" id="newsletter-signup">
  <div class="grid-row">
    <div class="grid-col-2">
      <div class="p-image-container is-highlighted u-hide--small u-hide--medium">
        {{ image(url="https://assets.ubuntu.com/v1/3311a5e4-newsletter.png",
        alt="", width="852", height="831", hi_def=True, attrs={ "class":
        "p-image-container__image", }, loading="auto") | safe }}
      </div>
    </div>
    {{ load_form("/blog/newsletter") | safe }}
  </div>
</div>
